name: Python CI (Ruff & Doctests)

# Dieser Workflow läuft bei jedem push und pull-request
on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest # Workflow wird auf einer Ubuntu-Linux-VM ausgeführt

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-doctestplus

      # ---- Lint (ohne Fix, bricht bei Verstößen ab)
      - name: Ruff Lint
        run: ruff check --target-version=py311 --output-format=github .

      # ---- Format-Check (bricht ab, wenn Format nicht passt)
      - name: Ruff Format (Check)
        run: |
          ruff format --check --target-version=py311 .

      # ---- Tests
      - name: Tests (Doctests in wc-Dateien)
        run: |
          pytest --doctest-modules *.py